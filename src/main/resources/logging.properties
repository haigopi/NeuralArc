# NeuralArc JUL logging configuration
# Single-line format: LEVEL  yyyy-MM-ddTHH:mm:ss.SSS  ClassName  methodName  message
handlers=java.util.logging.ConsoleHandler
.level=INFO

java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Format: LEVEL  DateTime  Source(Class.method)  Message
# %1$ = Date, %2$ = source (ClassName methodName), %3$ = logger name,
# %4$ = level, %5$ = message, %6$ = thrown
java.util.logging.SimpleFormatter.format=%4$-7s  %1$tY-%1$tm-%1$tdT%1$tH:%1$tM:%1$tS.%1$tL  %2$s  %5$s%6$s%n

